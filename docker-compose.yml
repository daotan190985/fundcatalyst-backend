services:
  postgres:
    image: postgres:16-alpine
    container_name: fcvn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fcvn
      POSTGRES_PASSWORD: fcvn
      POSTGRES_DB: fundcatalyst
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fcvn -d fundcatalyst"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fcvn-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: fcvn-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fcvn:fcvn@postgres:5432/fundcatalyst
      REDIS_URL: redis://redis:6379/0
      ENABLE_SCHEDULER: "true"
      DEBUG: "false"
      TZ: Asia/Ho_Chi_Minh
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  pg_data:
